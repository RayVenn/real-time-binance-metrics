# ── Flink JobManager ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: {{ .Values.namespace }}
  labels:
    app: flink-jobmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-jobmanager
  template:
    metadata:
      labels:
        app: flink-jobmanager
    spec:
      containers:
        - name: flink-jobmanager
          image: {{ .Values.images.flinkJobs.repository }}:{{ .Values.images.flinkJobs.tag }}
          imagePullPolicy: {{ .Values.images.flinkJobs.pullPolicy }}
          args: [jobmanager]
          ports:
            - containerPort: 8081
            - containerPort: 6123
          env:
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
                rest.bind-address: 0.0.0.0
          readinessProbe:
            httpGet:
              path: /overview
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: {{ .Values.namespace }}
  labels:
    app: flink-jobmanager
spec:
  selector:
    app: flink-jobmanager
  type: NodePort
  ports:
    - name: rest
      port: 8081
      targetPort: 8081
      nodePort: {{ .Values.flink.nodePort }}
    - name: rpc
      port: 6123
      targetPort: 6123
    - name: blob
      port: 6124
      targetPort: 6124
---
# ── Flink TaskManager ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: {{ .Values.namespace }}
  labels:
    app: flink-taskmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-taskmanager
  template:
    metadata:
      labels:
        app: flink-taskmanager
    spec:
      initContainers:
        - name: wait-for-jobmanager
          image: busybox
          command: [sh, -c, "until nc -z flink-jobmanager 8081; do echo waiting for jobmanager...; sleep 3; done"]
      containers:
        - name: flink-taskmanager
          image: {{ .Values.images.flinkJobs.repository }}:{{ .Values.images.flinkJobs.tag }}
          imagePullPolicy: {{ .Values.images.flinkJobs.pullPolicy }}
          args: [taskmanager]
          env:
            - name: FLINK_PROPERTIES
              value: |
                jobmanager.rpc.address: flink-jobmanager
                taskmanager.numberOfTaskSlots: {{ .Values.flink.taskSlots }}
---
# ── Job submission: OHLCV pipeline ───────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: flink-ohlcv-job
  namespace: {{ .Values.namespace }}
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-jobmanager
          image: busybox
          command: [sh, -c, "until nc -z flink-jobmanager 8081; do echo waiting...; sleep 3; done"]
        - name: wait-for-kafka
          image: busybox
          command: [sh, -c, "until nc -z kafka 29092; do echo waiting...; sleep 3; done"]
        - name: wait-for-db
          image: busybox
          command: [sh, -c, "until nc -z timescaledb 5432; do echo waiting...; sleep 3; done"]
      containers:
        - name: submit
          image: {{ .Values.images.flinkJobs.repository }}:{{ .Values.images.flinkJobs.tag }}
          imagePullPolicy: {{ .Values.images.flinkJobs.pullPolicy }}
          command:
            - bash
            - -c
            - |
              if flink list -m flink-jobmanager:8081 2>/dev/null | grep -q "ohlcv-1m"; then
                echo "ohlcv-1m already running, skipping submission"
              else
                flink run -d -m flink-jobmanager:8081 /opt/flink/usrlib/ohlcv-job.jar
              fi
---
# ── Job submission: Trade stream pipeline ────────────────────────────────────
apiVersion: batch/v1
