apiVersion: v1
kind: ConfigMap
metadata:
  name: timescaledb-init
  namespace: {{ .Values.namespace }}
data:
  init.sql: |
{{ .Files.Get "files/timescaledb-init.sql" | indent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb
  namespace: {{ .Values.namespace }}
  labels:
    app: timescaledb
spec:
  serviceName: timescaledb
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: {{ .Values.images.timescaledb }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: {{ .Values.timescaledb.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.timescaledb.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.timescaledb.password | quote }}
          readinessProbe:
            exec:
              command: [pg_isready, -U, {{ .Values.timescaledb.username }}, -d, {{ .Values.timescaledb.database }}]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-sql
          configMap:
            name: timescaledb-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.timescaledb.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: {{ .Values.namespace }}
  labels:
    app: timescaledb
spec:
  selector:
    app: timescaledb
  type: NodePort
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: {{ .Values.timescaledb.nodePort }}
