apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: {{ .Values.namespace }}
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: {{ .Values.images.kafka }}
          ports:
            - containerPort: 9092
            - containerPort: 29092
            - containerPort: 9093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            - name: KAFKA_LOG_RETENTION_HOURS
              value: "24"
            - name: CLUSTER_ID
              value: {{ .Values.kafka.clusterId | quote }}
          readinessProbe:
            exec:
              command: [kafka-broker-api-versions, --bootstrap-server, localhost:9092]
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: {{ .Values.namespace }}
  labels:
    app: kafka
spec:
  selector:
    app: kafka
  type: NodePort
  ports:
    - name: internal
      port: 29092
      targetPort: 29092
    - name: external
      port: 9092
      targetPort: 9092
      nodePort: {{ .Values.kafka.nodePort }}
---
# One-time Job: creates Kafka topics once Kafka is ready
apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-setup
  namespace: {{ .Values.namespace }}
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command: [sh, -c, "until nc -z kafka 29092; do echo waiting for kafka...; sleep 3; done"]
      containers:
        - name: kafka-setup
          image: {{ .Values.images.kafka }}
          env:
            - name: KAFKA_TOPICS
              value: {{ .Values.kafka.topics | quote }}
          command:
            - /bin/bash
            - -c
            - |
              IFS=',' read -ra TOPICS <<< "$KAFKA_TOPICS"
              for entry in "${TOPICS[@]}"; do
                IFS=':' read -r name partitions retention <<< "$entry"
                kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
                  --topic "$name" --partitions "$partitions" \
                  --replication-factor 1 --config retention.ms="$retention"
              done
              kafka-topics --bootstrap-server kafka:29092 --list
