apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: {{ .Values.namespace }}
  labels:
    app: producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: producer
  template:
    metadata:
      labels:
        app: producer
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox
          command: [sh, -c, "until nc -z kafka 29092; do echo waiting for kafka...; sleep 3; done"]
      containers:
        - name: producer
          image: {{ .Values.images.producer.repository }}:{{ .Values.images.producer.tag }}
          imagePullPolicy: {{ .Values.images.producer.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:29092
            - name: KAFKA_FLUSH_EVERY
              value: {{ .Values.producer.kafka.flushEvery | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.producer.kafka.topic | quote }}
            - name: KAFKA_DLQ_TOPIC
              value: {{ .Values.producer.kafka.dlqTopic | quote }}
            - name: KAFKA_ORDERBOOK_TOPIC
              value: {{ .Values.producer.kafka.orderbookTopic | quote }}
            - name: BINANCE_WS_URL
              value: {{ .Values.producer.binance.wsUrl | quote }}
            - name: SYMBOLS
              value: {{ .Values.producer.binance.symbols | quote }}
            - name: BINANCE_DEPTH_STREAMS
              value: {{ .Values.producer.binance.depthStreams | quote }}
            - name: COINBASE_WS_URL
              value: {{ .Values.producer.coinbase.wsUrl | quote }}
            - name: COINBASE_SYMBOLS
              value: {{ .Values.producer.coinbase.symbols | quote }}
            - name: COINBASE_HEALTH_PORT
              value: {{ .Values.producer.coinbase.healthPort | quote }}
            - name: KRAKEN_WS_URL
              value: {{ .Values.producer.kraken.wsUrl | quote }}
            - name: KRAKEN_SYMBOLS
              value: {{ .Values.producer.kraken.symbols | quote }}
            - name: RECONNECT_DELAY_S
              value: {{ .Values.producer.reconnect.delayS | quote }}
            - name: MAX_RECONNECT_DELAY_S
              value: {{ .Values.producer.reconnect.maxDelayS | quote }}
            - name: HEALTH_PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: producer
  namespace: {{ .Values.namespace }}
  labels:
    app: producer
spec:
  selector:
    app: producer
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: {{ .Values.producer.nodePort }}
